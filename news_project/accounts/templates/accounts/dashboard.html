tent { display: none; position: absolute; right: 0; top: 100%; background-color: #ffffff; min-width: 220px; box-shadow: 0 8px 16px rgba(0,0,0,0.2); z-index: 1002; border-radius: 10px; padding: 12px; font-size: 15px; } .dropdown-header { font-weight: bold; margin-bottom: 6px; color: #333; } .dropdown-section { margin-bottom: 16px; } .dropdown-section button { background-color: #00b8d9; color: white; border: none; padding: 8px 12px; margin-top: 6px; border-radius: 6px; cursor: pointer; width: 100%; transition: background 0.3s ease; } .font-buttons { display: flex; gap: 8px; justify-content: space-between; } .font-buttons button { flex: 1; padding: 6px 0; } /* Dark mode dropdown */ body.dark .dropdown-content { background-color: #2a2a2a; color: #ddd; } body.dark .dropdown-header { color: #ddd; } body.dark .dropdown-section button { background-color: #333; color: #eee; } body.dark .dropdown-section button:hover { background-color: #555; }

<script>
   
    const isSummaryMode = window.location.href.includes("summary=true");

async function loadSummarizedNews() {
    const container = document.getElementById("summary-container");
    container.style.display = "block";
    container.innerHTML = "<p style='text-align:center;'>Loading summaries...</p>";

    try {
        const res = await fetch("http://127.0.0.1:5000/summarized");
        const data = await res.json();

       
        const summaries = data.summarized;

        if (!summaries || summaries.length === 0) {
            container.innerHTML =
                "<p style='text-align:center;color:#666;'>No summary data available.</p>";
            return;
        }

        const isDark = document.body.classList.contains("dark");
        const articleBg = isDark ? "#2a2a2a" : "#f5f5f5";
        const articleColor = isDark ? "#e0e0e0" : "#333";
        const baselineBg = isDark ? "#1a237e" : "#e3f2fd";
        const baselineColor = isDark ? "#c5cae9" : "#1976d2";
        const customBg = isDark ? "#3e2723" : "#fff3e0";
        const customColor = isDark ? "#d7ccc8" : "#f57c00";
        const textColor = isDark ? "#ccc" : "#333";
        const headerColor = isDark ? "#81d4fa" : "#007acc";
        
        container.innerHTML = `
            <h2 style="text-align:center; color:${isDark ? '#e0f2f1' : '#023047'}; margin-bottom:30px;">Summary Comparison</h2>

            <div style="display:flex; flex-direction:column; gap:20px; padding:10px; max-width:1200px; margin:0 auto;">
                ${summaries.map((item, idx) => `
                    <div class="news-line" style="margin:20px auto; max-width:900px;">
                        <h3 style="color:${headerColor}; margin-bottom:15px;">Article ${idx + 1}</h3>
                        <div style="margin-bottom:15px; padding:10px; background:${articleBg}; border-radius:5px; color:${articleColor};">
                            <strong>Original Article:</strong>
                            <p style="margin-top:5px; line-height:1.6; color:${articleColor};">${item.article || 'N/A'}</p>
                        </div>
                        <div style="display:flex; gap:20px; margin-top:15px; flex-wrap:wrap;">
                            <div style="flex:1; min-width:300px; padding:15px; background:${baselineBg}; border-radius:8px;">
                                <h4 style="text-align:center; color:${baselineColor}; margin-bottom:10px;">Baseline T5 Summary</h4>
                                <p style="line-height:1.6; color:${textColor};">${item.summary_static || 'N/A'}</p>
                            </div>
                            <div style="flex:1; min-width:300px; padding:15px; background:${customBg}; border-radius:8px;">
                                <h4 style="text-align:center; color:${customColor}; margin-bottom:10px;">Custom Attention Summary</h4>
                                <div style="margin-bottom:8px; font-size:12px; color:${textColor};">
                                    <strong>Attention Score:</strong> ${item.attention_score || 'N/A'}
                                </div>
                                <p style="line-height:1.6; color:${textColor};">${item.summary_custom || 'N/A'}</p>
                            </div>
                        </div>
                    </div>
                `).join("")}
            </div>
        `;
    } catch (err) {
        console.error("Error loading summarized news:", err);
        container.innerHTML = "<p style='text-align:center;color:red;'>Error loading summaries.</p>";
    }
}





    
let gazeDurations = {}; 
const container = document.getElementById("newsContainer");
const lastUpdated = document.getElementById("lastUpdated");

async function fetchNews() {
    container.innerHTML = "<p>Loading latest news...</p>";

    try {
        
        const res = await fetch("http://localhost:5000/rss_news");
        
        if (!res.ok) {
            throw new Error(`HTTP error! status: ${res.status}`);
        }
        
        const data = await res.json();
        let articles = [];

        if (data && data.items && Array.isArray(data.items)) {
            articles = data.items.map(item => ({
                title: item.title || "No title",
                link: item.link || "#",
                description: item.description || "",
                pubDate: item.pubDate || new Date().toISOString()
            }));
        } else {
            console.warn("Invalid or empty RSS data", data);
            throw new Error("No articles received from server");
        }

        if (articles.length === 0) {
            throw new Error("No articles found in RSS feeds");
        }

       
        const processedArticles = updateNews(articles.slice(0, 10)); 
        lastUpdated.textContent = "Last updated: " + new Date().toLocaleString();
        
       
        if (processedArticles && processedArticles.length > 0) {
            const articlesToSave = processedArticles.map(a => ({
                title: a.title,
                description: a.fullText || (a.title + ". " + (a.description || ""))
            }));
            
            fetch("http://localhost:5000/save_articles", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(articlesToSave)
            }).catch(err => console.error("Error saving articles:", err));
        }
        
      
        if (!isSummaryMode) startGazeTracking();

    } catch (error) {
        console.error("Fetch error:", error);
        container.innerHTML = `
            <p style='color: red; text-align: center; padding: 20px;'>
                Could not load news. Error: ${error.message}
            </p>
            <p style='text-align: center; color: #666;'>
                Please ensure the backend server is running on http://localhost:5000
            </p>
            <p style='text-align: center; margin-top: 10px;'>
                <button onclick="fetchNews()" style="padding: 10px 20px; background: #007acc; color: white; border: none; border-radius: 5px; cursor: pointer;">
                    Retry
                </button>
            </p>
        `;
        lastUpdated.textContent = "Last updated: Failed to fetch";
    }
}


function updateNews(articles) {
    const container = document.getElementById("newsContainer");
    container.innerHTML = "";

    let validArticles = 0;
    const processedArticles = [];

    articles.forEach(article => {
       
        const tempDiv = document.createElement("div");
        tempDiv.innerHTML = article.description || "";
        const cleanText = tempDiv.textContent || tempDiv.innerText || "";

        
        let fullText;
        if (cleanText.trim()) {
            fullText = (article.title + ". " + cleanText.trim()).trim();
        } else {
            
            fullText = article.title + ".";
        }
        
        article.fullText = fullText;   
        processedArticles.push(article); 

      
        const card = document.createElement("div");
        card.className = "news-line";
        
   
        let dateStr = "Date not available";
        try {
            if (article.pubDate) {
                const date = new Date(article.pubDate);
                if (!isNaN(date.getTime())) {
                    dateStr = date.toLocaleString();
                }
            }
        } catch (e) {
            console.warn("Date parsing error:", e);
        }
        
        card.innerHTML = `
            <div class="news-title">
                <a href="${article.link || '#'}" target="_blank">${article.title || 'Untitled'}</a>
            </div>
            <div class="news-time">${dateStr}</div>
            <div class="news-description" style="line-height: 1.8; font-size: 16px; margin-top: 15px;">
                ${fullText || article.title}
            </div>
        `;
        container.appendChild(card);
        validArticles++;
    });

   
    if (validArticles === 0) {
        container.innerHTML = `
            <p style='text-align: center; color: #555; padding: 20px;'>
                No articles with content available at this time.
            </p>
            <p style='text-align: center; color: #888; font-size: 14px;'>
                The RSS feeds may be temporarily unavailable. Please try again later.
            </p>
        `;
    }
    
    return processedArticles; 
}

document.addEventListener("DOMContentLoaded", () => {
    if (location.href.includes("summary=true")) {
        const container = document.getElementById("summary-container");
        if (container) {
            loadSummarizedNews();
            document.getElementById("newsContainer").style.display = "none";
        } else {
            console.warn("summary-container not found even after DOM load.");
        }
    } else {
        fetchNews();
        setInterval(fetchNews, 15 * 60 * 1000);
    }
});


   
    let xOffset = 0, yOffset = 0;            
    let xDiffs = [], yDiffs = [], clicks = 0;
    let gazeHistory = [];                    
    let calibrationData = [];                
    let modelReady = false;                  
    let manualCalibrationDone = false;       
    let autoCalibrationTimer = null;         
    let countdownInterval = null;           
    const status = document.getElementById('status');
    const dots = document.querySelectorAll('.dot');

    
    function waitForPrediction(callback) {
        let waitTime = 3;
        status.innerText = `Stabilizing... ${waitTime}s`;

        const countdown = setInterval(() => {
            waitTime--;
            status.innerText = `Stabilizing... ${waitTime}s`;
            if (waitTime === 0) {
                clearInterval(countdown);
                webgazer.getCurrentPrediction().then(pred => {
                    if (pred) {callback(pred);}
                    else {status.innerText = "Prediction failed, try again.";}
                });
            }
        }, 1000);
    }

    function recordCalibration(pred, actualX, actualY) {
        calibrationData.push({
            predX: pred.x,
            predY: pred.y,
            scrollY: window.scrollY,
            screenX: actualX,
            screenY: actualY
        });
    }

    
    dots.forEach(dot => {
        dot.addEventListener('click', function () {
            const rect = dot.getBoundingClientRect();
            const actualX = rect.left + rect.width / 2;
            const actualY = rect.top + rect.height / 2;

            waitForPrediction(pred => {
                const dx = pred.x - actualX;
                const dy = pred.y - actualY;
                xDiffs.push(dx);
                yDiffs.push(dy);

                recordCalibration(pred, actualX, actualY);

                console.log(`Calibration ${clicks + 1}: Predicted (${Math.round(pred.x)}, ${Math.round(pred.y)}) vs Actual (${Math.round(actualX)}, ${Math.round(actualY)}) -> Offset: (${Math.round(dx)}, ${Math.round(dy)})`);

                dot.style.backgroundColor = 'green';
                dot.style.pointerEvents = 'none';
                clicks++;

                if (clicks === 4) { 
                    xOffset = xDiffs.reduce((a, b) => a + b, 0) / xDiffs.length;
                    yOffset = yDiffs.reduce((a, b) => a + b, 0) / yDiffs.length;
                    console.log(`Final Average Offset: (${Math.round(xOffset)}, ${Math.round(yOffset)})`);

                    
                    if (autoCalibrationTimer) {
                        clearTimeout(autoCalibrationTimer);
                        autoCalibrationTimer = null;
                    }
                    if (countdownInterval) {
                        clearInterval(countdownInterval);
                        countdownInterval = null;
                    }

                   
                    fetch("http://localhost:5000/upload", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(calibrationData)
                    }).then(res => res.json())
                      .then(res => {
                          console.log(`XGBoost trained with ${res.samples} samples`);
                          modelReady = true;
                          manualCalibrationDone = true;
                          startTime = Date.now(); 
                          sent = false;
                          status.innerText = "Calibration complete. Tracking gaze now.";
                          dots.forEach(d => d.style.display = 'none');
                      });
                }
            });
        });
    });

    
    function smoothGaze(x, y) {
        gazeHistory.push({ x, y });
        if (gazeHistory.length > 5) gazeHistory.shift();
        const avgX = gazeHistory.reduce((sum, g) => sum + g.x, 0) / gazeHistory.length;
        const avgY = gazeHistory.reduce((sum, g) => sum + g.y, 0) / gazeHistory.length;
        return { x: avgX, y: avgY };
    }

    let startTime = Date.now();
    let sent = false;
    let lastSentTime = 0;
    const THROTTLE_DELAY = 200; 
    const GAZE_COLLECTION_TIME = 15000; 
    let webgazerActive = true;

   
    function startGazeTracking() {
        const calibrationStartTime = Date.now();
        let autoCalibrationStarted = false;
        
        
        status.innerText = "Please click on the 4 calibration dots. You have 60 seconds...";
        let countdownSeconds = 60;
        countdownInterval = setInterval(() => {
            if (manualCalibrationDone || modelReady) {
                if (countdownInterval) {
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                }
                return;
            }
            countdownSeconds--;
            if (countdownSeconds > 0) {
                status.innerText = `Please click on the 4 calibration dots. ${countdownSeconds} seconds remaining...`;
            } else {
                if (countdownInterval) {
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                }
            }
        }, 1000);
        
       
        autoCalibrationTimer = setTimeout(() => {
            if (!manualCalibrationDone && !modelReady && !autoCalibrationStarted) {
                autoCalibrationStarted = true;
                if (countdownInterval) {
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                }
                status.innerText = "Starting auto-calibration (manual calibration timeout)...";
                console.log("Auto-calibration started after 30 seconds wait");
            }
        }, 60000); 
        webgazer.setRegression('ridge')
            .setGazeListener(data => {
                if (!data || !webgazerActive) return;

                if (!modelReady) {
                    
                    const dot = document.getElementById('gaze-dot');
                    dot.style.left = `${data.x}px`;
                    dot.style.top = `${data.y}px`;

                    
                    const timeSinceStart = Date.now() - calibrationStartTime;
                    if (!manualCalibrationDone && autoCalibrationStarted && timeSinceStart >= 60000 && calibrationData.length < 100) {
                        calibrationData.push({
                            predX: data.x,
                            predY: data.y,
                            scrollY: window.scrollY,
                            screenX: data.x,
                            screenY: data.y
                        });

                        if (calibrationData.length === 100) {
                           
                            if (autoCalibrationTimer) {
                                clearTimeout(autoCalibrationTimer);
                                autoCalibrationTimer = null;
                            }
                            
                            fetch("http://localhost:5000/upload", {
                                method: "POST",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify(calibrationData)
                            })
                            .then(res => res.json())
                            .then(() => {
                                modelReady = true;
                                startTime = Date.now(); 
                                sent = false; 
                                status.innerText = "Auto-Calibration Complete. Tracking gaze now.";
                                dots.forEach(d => d.style.display = 'none');
                            });
                        }
                    }
                    

                    return;   
                }

                const offsetX = data.x - xOffset;
                const offsetY = data.y - yOffset;
                const smoothed = smoothGaze(offsetX, offsetY);
                const now = Date.now();
                if (now - lastSentTime < THROTTLE_DELAY) return;
                lastSentTime = now;

                
                fetch("http://localhost:5000/predict", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ predX: data.x, predY: data.y, scrollY: window.scrollY })
                })
                .then(res => res.json())
                .then(corrected => {
                    const dot = document.getElementById('gaze-dot');
                    dot.style.left = corrected.x + 'px';
                    dot.style.top = corrected.y + 'px';

                    
                    document.querySelectorAll(".news-line").forEach((line, index) => {
                        const rect = line.getBoundingClientRect();
                        const withinY = corrected.y >= (rect.top - 50) && corrected.y <= (rect.bottom + 50);
                        if (withinY) {
                            if (!gazeDurations[index]) gazeDurations[index] = 0;
                            gazeDurations[index] += 1;
                        }
                    });

                    
                    const elapsedTime = Date.now() - startTime;
                    if (elapsedTime > GAZE_COLLECTION_TIME && !sent) {
                        sent = true;
                        console.log("GazeDurations:", gazeDurations);
                        status.innerText = "Processing gaze data...";

                        if (Object.keys(gazeDurations).length === 0) { 
                            console.warn("No gaze data recorded. Skipping save."); 
                            status.innerText = "No gaze data recorded. Please try again.";
                            return; 
                        }

                        
                        const totalPossibleHits = (GAZE_COLLECTION_TIME / THROTTLE_DELAY);
                        const payload = Object.keys(gazeDurations).map(index => ({
                            line: parseInt(index),
                            gaze_score: Math.min(gazeDurations[index] / totalPossibleHits, 1.0)
                        }));

                        fetch("http://localhost:5000/gaze_scores", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(payload)
                        }).then(() => {
                            console.log("Gaze scores saved. Running pipeline...");
                            status.innerText = "Generating summaries...";

                            
                            webgazerActive = false;
                            
                           
                            try {
                                
                                if (webgazer && typeof webgazer.pause === 'function') {
                                    webgazer.pause();
                                }
                                
                                
                                if (webgazer && typeof webgazer.end === 'function') {
                                    webgazer.end();
                                }
                                
                                
                                const gazeDot = document.getElementById('gaze-dot');
                                if (gazeDot) {
                                    gazeDot.style.display = 'none';
                                }
                                
                                
                                const videoElements = document.querySelectorAll('video');
                                videoElements.forEach(video => {
                                    if (video.srcObject) {
                                        const tracks = video.srcObject.getTracks();
                                        tracks.forEach(track => {
                                            track.stop();
                                            console.log("Stopped video track:", track.kind);
                                        });
                                        video.srcObject = null;
                                    }
                                });
                                
                                console.log("Webgazer and camera stopped successfully");
                            } catch (e) {
                                console.error("Error stopping webgazer:", e);
                               
                                try {
                                    const videoElements = document.querySelectorAll('video');
                                    videoElements.forEach(video => {
                                        if (video.srcObject) {
                                            const tracks = video.srcObject.getTracks();
                                            tracks.forEach(track => track.stop());
                                            video.srcObject = null;
                                        }
                                    });
                                } catch (e2) {
                                    console.error("Error stopping video tracks:", e2);
                                }
                            }

                            
                            fetch("http://localhost:5000/run_pipeline")
                                .then(res => res.json())
                                .then(() => {
                                    console.log("Pipeline triggered. Waiting for output.json...");

                                    const checkOutputReady = async () => {
                                        const res = await fetch("http://localhost:5000/summarized");
                                        const data = await res.json();
                                        if (data && data.summarized && data.summarized.length > 0) {
                                            document.getElementById("newsContainer").style.display = "none";
                                            document.getElementById("summary-container").style.display = "block";
                                            loadSummarizedNews();
                                            status.innerText = "Summaries ready!";
                                        } else {
                                            setTimeout(checkOutputReady, 1000);
                                        }
                                    };
                                    checkOutputReady();
                                });
                        });
                    } else if (!sent) {
                        
                        const remaining = Math.ceil((GAZE_COLLECTION_TIME - elapsedTime) / 1000);
                        if (remaining > 0 && remaining <= 60) {
                            status.innerText = `Tracking gaze... ${remaining}s remaining`;
                        }
                    }
                });
            })
            .begin();

        
        webgazer.showPredictionPoints(false);
        webgazer.showVideo(false);
        webgazer.showFaceOverlay(false);
        webgazer.showFaceFeedbackBox(false);
    }
   
    window.onscroll = function () {
        const backToTopBtn = document.getElementById("backToTop");
        if (document.documentElement.scrollTop > 3 || document.body.scrollTop > 3) {
            backToTopBtn.style.display = "block";
        } else {
            backToTopBtn.style.display = "none";
        }
    };

    
    const toggleBtn = document.getElementById("themeToggle");

    function applySavedTheme() {
        const saved = localStorage.getItem("theme");
        const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;

        if (saved === "dark" || (!saved && prefersDark)) {
            document.body.classList.add("dark");
            toggleBtn.textContent = "Light Mode";
        } else {
            document.body.classList.remove("dark");
            toggleBtn.textContent = "Dark Mode";
        }
    }

    toggleBtn.addEventListener("click", () => {
        document.body.classList.toggle("dark");
        const isDark = document.body.classList.contains("dark");
        toggleBtn.textContent = isDark ? "Light Mode" : "Dark Mode";
        localStorage.setItem("theme", isDark ? "dark" : "light");
    });

    applySavedTheme();

    
    const menuToggle = document.getElementById("menuToggle");
    const dropdownMenu = document.getElementById("dropdownMenu");

    menuToggle.addEventListener("click", () => {
        dropdownMenu.style.display = dropdownMenu.style.display === "block" ? "none" : "block";
    });

    window.addEventListener("click", (e) => {
        if (!menuToggle.contains(e.target) && !dropdownMenu.contains(e.target)) {
            dropdownMenu.style.display = "none";
        }
    });

   
    document.getElementById('refreshBtn').addEventListener('click', () => {
        const btn = document.getElementById('refreshBtn');
        btn.textContent = 'Refreshing...';
        fetchNews().then(() => {
            btn.textContent = ' Refreshed!';
            setTimeout(() => btn.textContent = 'Refresh News', 2000);
        });
    });

   
    function setFontSize(size) {
        document.body.classList.remove("small-font", "medium-font", "large-font");
        document.body.classList.add(size + "-font");
        localStorage.setItem("fontSize", size);
    }

    window.addEventListener("DOMContentLoaded", () => {
        const savedSize = localStorage.getItem("fontSize") || "medium";
        setFontSize(savedSize);
    });
</script>


<button id="backToTop" onclick="window.scrollTo({top: 0, behavior: 'smooth'});">Up</button>
</body>
