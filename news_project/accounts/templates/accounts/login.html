{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Focus News</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-r from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center">

  <div class="bg-white shadow-2xl rounded-xl p-8 w-full max-w-md">
    <h2 class="text-3xl font-semibold text-center text-indigo-700 mb-6">Welcome Back</h2>

    {% if messages %}
      {% for message in messages %}
        <div class="text-center text-red-600 mb-4">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="POST" action="{% url 'login' %}">
      {% csrf_token %}

      <div class="mb-4">
        <label for="username" class="block text-gray-700 font-medium mb-2">Username</label>
        <input type="text" name="username" id="username" required
          class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-400 focus:outline-none">
      </div>

      <div class="mb-6">
        <label for="password" class="block text-gray-700 font-medium mb-2">Password</label>
        <input type="password" name="password" id="password" required
          class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-400 focus:outline-none">
      </div>

      <button type="submit"
        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2 rounded-md text-lg transition duration-200">
        Login
      </button>
    </form>

    

    <p class="mt-4 text-center text-gray-600">
      Don’t have an account?
      <a href="{% url 'signup' %}" class="text-indigo-600 hover:underline font-medium">Sign Up</a>
    </p>
  </div>

</body>
</html>
